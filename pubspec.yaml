name: meti_app
description: ELID by METI - Digital Business Card & Global Networking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: 6.1.5+1

  # HTTP & API
  http: 1.5.0

  # Local Storage
  shared_preferences: 2.5.3

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2

  # 주소검색 (다음/카카오 우편번호 — 공식 webview_flutter로 임베드)
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# ── ELID 앱 아이콘 (elid_brand_kit) ──────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#0B1E40"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0B1E40"
    theme_color: "#0B1E40"

# ── ELID 스플래시 (#0B1E40 + 심볼) ───────────────────────
flutter_native_splash:
  color: "#0B1E40"
  image: assets/brand/elid_appicon_512.png
  android_12:
    color: "#0B1E40"
    image: assets/brand/elid_appicon_512.png

flutter:
  uses-material-design: true
  assets:
    - assets/card_design_catalog.json
    - assets/images/
    - assets/images/buttons/
    - assets/icons/
    - assets/icons/tabbar/
    - assets/brand/
