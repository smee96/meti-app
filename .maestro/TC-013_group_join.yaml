appId: com.meti.meti_app
tags:
  - groups
  - p1
---
# BUG-AOS-002 수정됨: joinGroup() 신청 단계 멤버 한도 체크 제거
# Happy Path: 가입 신청 완료 후 그룹 화면 복귀 검증
- launchApp:
    clearState: true
- runFlow: _login.yaml

- tapOn:
    point: "30%, 94%"
- waitForAnimationToEnd

# 첫 번째 공개 그룹 탭 (y≈31%: METI 개발자 모임 bounds [42,605][1038,870])
- tapOn:
    point: "50%, 31%"
- waitForAnimationToEnd

# 가입 신청하기 버튼 탭 (implicit assertion: 버튼 없으면 timeout fail)
- tapOn: "가입 신청하기"
- waitForAnimationToEnd

# 가입 신청 폼 확인
- assertVisible: "가입 신청"
- tapOn: "신청하기"
- waitForAnimationToEnd:
    timeout: 3000

# 성공 시: 바텀시트 닫힘 + 스낵바 "그룹 가입 신청이 완료되었습니다!" → 그룹 탐색 화면 복귀
# 스낵바 타이밍 이슈로 assertVisible 불가, 그룹명 리스트 카드 multiline 이슈
# → AppBar 타이틀 "그룹" 확인으로 대체
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "그룹"
