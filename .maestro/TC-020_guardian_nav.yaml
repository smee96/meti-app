appId: com.meti.meti_app
tags:
  - guardian
  - p1
---
- launchApp:
    clearState: true
- runFlow: _login.yaml

- tapOn:
    point: "90%, 94%"
- waitForAnimationToEnd

- scroll

- tapOn: "보호자 관리"
- waitForAnimationToEnd

# 보호자 관리 화면 확인 (AppBar 타이틀)
- assertVisible: "보호자 관리"

# 탭 확인 — TabBar 탭은 좌표 탭 (내 보호자 x≈25%, 내 학생 x≈75%, y≈11%)
- tapOn:
    point: "75%, 11%"
- waitForAnimationToEnd

- tapOn:
    point: "25%, 11%"
- waitForAnimationToEnd
