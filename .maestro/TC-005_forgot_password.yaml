appId: com.meti.meti_app
tags:
  - auth
  - p1
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: "시작하기"
    file: _skip_onboarding.yaml

# 비밀번호 찾기 링크
- tapOn:
    text: "비밀번호를 잊으셨나요?"
    optional: true
- runFlow:
    when:
      visible: "비밀번호 찾기"
    commands:
      - tapOn: "비밀번호 찾기"

- waitForAnimationToEnd
- assertVisible: "이메일"

- tapOn:
    text: "이메일"
    optional: true
- inputText: "test@meti.dev"
- hideKeyboard

- tapOn: "재설정 링크 발송"

- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "이메일 발송 완료"
